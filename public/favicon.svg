<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#006B7F;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00A89D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9B4A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="armGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#006B7F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="armGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD662;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="#ffffff"/>
  
  <!-- Outer Circle Border -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#mainGrad)" stroke-width="3"/>
  
  <!-- Inner white circle -->
  <circle cx="50" cy="50" r="43" fill="#ffffff" opacity="0.95"/>
  
  <!-- Head -->
  <circle cx="50" cy="30" r="5" fill="url(#mainGrad)"/>
  
  <!-- Left arm upward -->
  <path d="M 42 38 Q 25 28 28 15 Q 30 22 35 32" stroke="url(#armGrad1)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  
  <!-- Right arm upward -->
  <path d="M 58 38 Q 75 28 72 15 Q 70 22 65 32" stroke="url(#armGrad1)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  
  <!-- Left body curve -->
  <path d="M 40 42 Q 28 50 32 68" stroke="url(#armGrad1)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Right body curve -->
  <path d="M 60 42 Q 72 50 68 68" stroke="url(#armGrad2)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Connecting arc -->
  <path d="M 32 68 Q 50 75 68 68" stroke="url(#mainGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
